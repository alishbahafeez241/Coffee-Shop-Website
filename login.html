
<!DOCTYPE html>
<html lang="en" ng-app="loginApp">
<head>
    <title>Login | Coffee Beans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2C1810 0%, #4A2C1A 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .coffee-header {
            background-color: #2c1810;
            color: #f5e6d3;
            padding: 1.2rem 2rem;
            text-align: center;
            border-bottom: 3px solid #c4a27a;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .coffee-header h1 { 
            font-size: 2rem; 
            letter-spacing: 3px; 
            margin-bottom: 0.5rem; 
            font-weight: 700;
        }
        
        .coffee-header h1 i { 
            margin-right: 10px;
            color: #c4a27a;
        }
        
        /* Navbar Styles */
        .nav-coffee {
            list-style: none;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
            padding: 0;
        }
        
        .nav-coffee .nav-link {
            color: #f5e6d3;
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .nav-coffee .nav-link:hover {
            color: #c4a27a;
            background: rgba(196, 162, 122, 0.2);
        }
        
        .nav-coffee .nav-link.active {
            color: #2c1810 !important;
            background: #e0b586 !important;
            font-weight: bold;
        }
        
        /* Login Wrapper */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        
        .coffee-card {
            background: #FFF8F0;
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        
        /* Card Header - Centered */
        .card-header-coffee {
            background: #3E2723;
            padding: 2rem 1.5rem;
            text-align: center;
            border-bottom: none;
        }
        
        .card-header-coffee h2 {
            color: #FFF8F0;
            font-size: 28px;
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
            text-align: center;
        }
        
        .card-header-coffee p {
            color: #D7CCC8;
            margin-top: 8px;
            font-size: 14px;
            text-align: center;
        }
        
        .coffee-icon-large {
            font-size: 3.5rem;
            color: #f0d5b0;
            text-align: center;
        }
        
        .login-form-custom { 
            padding: 2rem 1.8rem; 
        }
        
        .input-group-custom label { 
            display: block; 
            margin-bottom: 8px; 
            font-weight: 600; 
            color: #3E2723; 
        }
        
        .input-group-custom input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0D5C1;
            border-radius: 16px;
            font-size: 16px;
            background: white;
        }
        
        .input-group-custom input:focus {
            outline: none;
            border-color: #6F4E37;
            box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.2);
        }
        
        .btn-coffee {
            background: #6F4E37;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
        }
        
        .btn-coffee:hover { background: #4A2C1A; }
        
        .forgot-link-custom { 
            color: #6F4E37; 
            text-decoration: none; 
            font-weight: 500; 
            font-size: 0.85rem;
            cursor: pointer;
        }
        
        .forgot-link-custom:hover { text-decoration: underline; }
        
        .signup-text-custom { 
            text-align: center; 
            font-size: 14px; 
            color: #5D4037; 
            margin-top: 1rem; 
        }
        
        .signup-text-custom a { 
            color: #6F4E37; 
            font-weight: bold; 
            text-decoration: none; 
        }
        
        .signup-text-custom a:hover { text-decoration: underline; }
        
        .demo-badge {
            background: #E8E0D5;
            padding: 12px;
            border-radius: 20px;
            font-size: 13px;
            text-align: center;
            color: #3E2723;
            margin-bottom: 1.5rem;
        }
        
        .error-message-custom {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        
        footer {
            background-color: #2c1810;
            color: #f5e6d3;
            text-align: center;
            padding: 1.2rem;
            margin-top: auto;
        }
        
        .field-hint { 
            font-size: 12px; 
            color: #C62828; 
            margin-top: 4px; 
            min-height: 14px; 
        }
        
        .shake { 
            animation: shake .4s; 
        }
        
        @keyframes shake { 
            0%,100%{transform:translateX(0)} 
            20%,60%{transform:translateX(-10px)} 
            40%,80%{transform:translateX(10px)} 
        }
        
        .form-check-label {
            color: #3E2723;
            font-size: 0.85rem;
        }
        
        @media (max-width: 576px) {
            .coffee-header h1 { font-size: 1.5rem; }
            .card-header-coffee h2 { font-size: 24px; }
        }
    </style>
</head>
<body>

<header class="coffee-header">
    <h1><i class="bi bi-cup-hot-fill"></i> COFFEE BEANS</h1>
    <ul class="nav-coffee">
        <li><a class="nav-link" href="index.html">Home</a></li>
        <li><a class="nav-link" href="menu.html">Menu</a></li>
        <li><a class="nav-link" href="contact.html">Contact</a></li>
        <li><a class="nav-link active" href="login.html">Login</a></li>
        <li><a class="nav-link" href="cart.html">Cart</a></li>
        <li><a class="nav-link" href="reviews.html">Reviews</a></li>
    </ul>
</header>

<div class="login-wrapper">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                <div class="card coffee-card">
                    <div class="card-header-coffee">
                        <h2>Welcome Back!</h2>
                        <p>Sign in to your account</p>
                    </div>
                    
                    <div class="login-form-custom">
                        <div class="demo-badge">
                            <i class="bi bi-info-circle-fill me-1"></i> Demo: Use <strong>user@coffee.com</strong> / <strong>coffee123</strong>
                        </div>
                        
                        <div class="error-message-custom" id="errorMsg">
                            <i class="bi bi-exclamation-triangle-fill me-1"></i> Invalid email or password.
                        </div>
                        
                        <form id="loginForm">
                            <div class="mb-3 input-group-custom">
                                <label><i class="bi bi-envelope-fill me-1"></i> Email Address</label>
                                <input type="email" class="form-control" id="email" placeholder="Enter your email">
                                <div class="field-hint" id="emailHint"></div>
                            </div>
                            
                            <div class="mb-3 input-group-custom">
                                <label><i class="bi bi-lock-fill me-1"></i> Password</label>
                                <input type="password" class="form-control" id="password" placeholder="Enter your password">
                                <div class="field-hint" id="passwordHint"></div>
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberCheck">
                                    <label class="form-check-label" for="rememberCheck">Remember me</label>
                                </div>
                                <a href="forgot-password.html" class="forgot-link-custom">Forgot Password?</a>
                            </div>
                            
                            <button type="submit" class="btn-coffee mb-3">
                                <i class="bi bi-box-arrow-in-right me-2"></i> LOGIN
                            </button>
                            
                            <div class="signup-text-custom">
                                Don't have an account? <a href="signup.html">Sign Up</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer>
    <p class="mb-0">All rights reserved by Maryam Alishba</p>
</footer>

<script>
    function isEmail(v){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }
    
    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        var email = document.getElementById('email');
        var pwd = document.getElementById('password');
        var emailHint = document.getElementById('emailHint');
        var pwdHint = document.getElementById('passwordHint');
        var errorMsg = document.getElementById('errorMsg');
        var ok = true;
        
        // Validation
        if (!isEmail(email.value.trim())) { 
            emailHint.textContent = 'Please enter a valid email address'; 
            ok = false; 
        } else { 
            emailHint.textContent = ''; 
        }
        
        if (pwd.value.length < 6) { 
            pwdHint.textContent = 'Password must be at least 6 characters'; 
            ok = false; 
        } else { 
            pwdHint.textContent = ''; 
        }
        
        if (!ok) return;
        
        // Check credentials
        var savedEmail = localStorage.getItem('user_email');
        var savedPassword = localStorage.getItem('user_password');
        
        if ((email.value === 'user@coffee.com' && pwd.value === 'coffee123') ||
            (savedEmail === email.value && savedPassword === pwd.value)) {
            errorMsg.style.display = 'none';
            alert('✅ Login successful! Welcome back.');
            
            // jQuery effect on success
            $('.coffee-card').css('border', '2px solid #28a745').animate({ backgroundColor: '#e8f5e9' }, 300)
                .animate({ backgroundColor: '#FFF8F0' }, 500);
        } else {
            errorMsg.style.display = 'block';
            $('.coffee-card').addClass('shake');
            setTimeout(function() { $('.coffee-card').removeClass('shake'); }, 500);
        }
    });
    
    // jQuery for fade in animation
    $(document).ready(function() {
        $('.coffee-card').hide().fadeIn(700);
    });
</script>

</body>
</html>

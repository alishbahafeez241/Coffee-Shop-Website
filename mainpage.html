<!DOCTYPE html>
<html lang="en" ng-app="coffeeApp">
<head>
    <title>COFFEE BEANS – Welcome</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #2c1810;
            overflow-x: hidden;
        }

        /* Full-screen hero header */
        header {
            background: radial-gradient(ellipse at center, #3d2010 0%, #2c1810 60%, #1a0d07 100%);
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 1rem 5rem 1rem;
            color: #f5e6d3;
            position: relative;
            overflow: hidden;
        }

        /* Floating particles */
        .particle {
            position: absolute;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: rgba(196, 162, 122, 0.3);
            animation: float linear infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%   { transform: translateY(110vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 0.6; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        nav {
            background: rgba(255,255,255,0.07);
            padding: 0.8rem 2rem;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(245,230,211,0.15);
            width: 100%;
            max-width: 700px;
            text-align: center;
            z-index: 10;
        }

        nav a {
            color: #f5e6d3;
            text-decoration: none;
            margin: 0 0.8rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: color 0.3s;
        }

        nav a:hover { color: #c4a27a; }

        /* Hamburger for mobile */
        .hamburger {
            display: none;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(245,230,211,0.2);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            color: #f5e6d3;
            cursor: pointer;
            font-size: 1.4rem;
            z-index: 10;
        }

        .mobile-nav {
            display: none;
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(44, 24, 16, 0.97);
            border: 1px solid rgba(196,162,122,0.3);
            border-radius: 16px;
            padding: 1rem 2rem;
            z-index: 200;
            text-align: center;
        }

        .mobile-nav.open { display: block; }
        .mobile-nav a { display: block; color: #f5e6d3; text-decoration: none; padding: 0.5rem 0; font-weight: 600; letter-spacing: 1px; }
        .mobile-nav a:hover { color: #c4a27a; }

        /* Logo area */
        .logo-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 5;
        }

        .logo-circle {
            width: 180px; height: 180px;
            background: radial-gradient(circle, #4a2c1a 0%, #2c1810 100%);
            border: 6px double #c4a27a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5.5rem;
            box-shadow: 0 0 40px rgba(196,162,122,0.25), 0 0 80px rgba(196,162,122,0.1);
            margin-bottom: 2rem;
            cursor: pointer;
            transition: transform 0.6s ease, box-shadow 0.4s ease;
        }

        .logo-circle:hover {
            transform: scale(1.08) rotate(8deg);
            box-shadow: 0 0 60px rgba(196,162,122,0.5), 0 0 100px rgba(196,162,122,0.2);
        }

        .logo-circle.spin { animation: spinOnce 0.7s ease; }
        @keyframes spinOnce { from { transform: rotate(0deg) scale(1); } 50% { transform: rotate(180deg) scale(1.1); } to { transform: rotate(360deg) scale(1); } }

        header h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 200;
            letter-spacing: clamp(6px, 2vw, 12px);
            text-align: center;
            text-transform: uppercase;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            animation: fadeInUp 1s ease 0.3s both;
        }

        .welcome-text {
            font-size: 0.95rem;
            letter-spacing: 3px;
            color: #c4a27a;
            margin-top: 10px;
            animation: fadeInUp 1s ease 0.6s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Scroll indicator */
        .scroll-hint {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: rgba(245,230,211,0.5);
            font-size: 0.8rem;
            letter-spacing: 2px;
            animation: bounce 2s infinite;
            z-index: 5;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(8px); }
        }

        /* Content section below hero */
        .content-section {
            background: #faf6f0;
            padding: 4rem 1.5rem;
        }

        .content-inner {
            max-width: 1100px;
            margin: 0 auto;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .info-card {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: default;
        }

        .info-card:hover { transform: translateY(-6px); box-shadow: 0 10px 28px rgba(0,0,0,0.12); }

        .info-card .icon { font-size: 2.8rem; margin-bottom: 1rem; }
        .info-card h3 { color: #2c1810; margin-bottom: 0.5rem; font-size: 1.1rem; font-weight: 700; }
        .info-card p { color: #6b4c3a; font-size: 0.9rem; line-height: 1.6; }

        .cta-row {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .btn-cta {
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .btn-cta-primary { background: #6F4E37; color: white; }
        .btn-cta-primary:hover { background: #4A2C1A; color: white; transform: scale(1.03); }
        .btn-cta-outline { background: transparent; color: #6F4E37; border-color: #6F4E37; }
        .btn-cta-outline:hover { background: #6F4E37; color: white; transform: scale(1.03); }

        .section-title {
            text-align: center;
            font-size: 2rem;
            color: #2c1810;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: uppercase;
        }

        .section-title span { color: #c4a27a; }

        footer {
            background-color: #2c1810;
            color: #f5e6d3;
            text-align: center;
            padding: 1.5rem;
        }

        @media (max-width: 600px) {
            nav { display: none; }
            .hamburger { display: block; }
            .logo-circle { width: 140px; height: 140px; font-size: 4rem; }
        }
    </style>
</head>
<body ng-controller="MainCtrl">

    <header>
        <!-- Particles rendered by AngularJS -->
        <div class="particle" ng-repeat="p in particles" ng-style="p.style"></div>

        <!-- Desktop nav -->
        <nav class="d-none d-md-block">
            <a href="index.html">Home</a>
            <a href="menu.html">Menu</a>
            <a href="contact.html">Contact</a>
            <a href="login.html">Login</a>
            <a href="cart.html">Cart</a>
            <a href="reviews.html">Reviews</a>
        </nav>

        <!-- Mobile hamburger -->
        <button class="hamburger d-md-none" ng-click="toggleMenu()">
            <i class="bi" ng-class="menuOpen ? 'bi-x-lg' : 'bi-list'"></i>
        </button>
        <div class="mobile-nav" ng-class="{open: menuOpen}">
            <a href="index.html" ng-click="menuOpen=false">Home</a>
            <a href="menu.html" ng-click="menuOpen=false">Menu</a>
            <a href="contact.html" ng-click="menuOpen=false">Contact</a>
            <a href="login.html" ng-click="menuOpen=false">Login</a>
            <a href="cart.html" ng-click="menuOpen=false">Cart</a>
            <a href="reviews.html" ng-click="menuOpen=false">Reviews</a>
        </div>

        <div class="logo-area">
            <div class="logo-circle" ng-class="{spin: spinning}" ng-click="spinLogo()">☕</div>
            <h1>COFFEE BEANS</h1>
            <p class="welcome-text">WELCOME TO THE COFFEE BEANS</p>
        </div>

        <div class="scroll-hint">
            <span>EXPLORE</span>
            <i class="bi bi-chevron-double-down mt-1"></i>
        </div>
    </header>

    <!-- Info cards section -->
    <div class="content-section">
        <div class="content-inner">
            <h2 class="section-title">BREWED WITH <span>PASSION</span></h2>

            <div class="info-grid">
                <div class="info-card" ng-repeat="card in infoCards">
                    <div class="icon">{{card.icon}}</div>
                    <h3>{{card.title}}</h3>
                    <p>{{card.desc}}</p>
                </div>
            </div>

            <div class="cta-row">
                <a href="menu.html" class="btn-cta btn-cta-primary">View Our Menu</a>
                <a href="contact.html" class="btn-cta btn-cta-outline">Find Us</a>
            </div>
        </div>
    </div>

    <footer>
        <p>All rights reserved by Maryam Alishba</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script>
        const app = angular.module('coffeeApp', []);

        app.controller('MainCtrl', function($scope, $timeout) {
            $scope.menuOpen = false;
            $scope.spinning = false;

            $scope.toggleMenu = function() { $scope.menuOpen = !$scope.menuOpen; };

            $scope.spinLogo = function() {
                if ($scope.spinning) return;
                $scope.spinning = true;
                $timeout(function() { $scope.spinning = false; }, 700);
            };

            // Info cards data
            $scope.infoCards = [
                { icon: '🌱', title: 'Ethically Sourced', desc: '100% Arabica & Robusta blends, organically farmed and sustainably sourced from around the world.' },
                { icon: '🔥', title: 'Roasted Daily', desc: 'Every batch is roasted in-house each morning to lock in maximum freshness and flavour.' },
                { icon: '🥐', title: 'Homemade Pastries', desc: 'Buttery croissants, muffins, and avocado toast crafted fresh in our kitchen every day.' },
                { icon: '📶', title: 'Cozy & Connected', desc: 'Comfortable seating, warm ambiance, and complimentary high-speed Wi-Fi for you to enjoy.' },
            ];

            // Generate floating coffee-bean particles
            $scope.particles = [];
            for (let i = 0; i < 18; i++) {
                $scope.particles.push({
                    style: {
                        left: Math.random() * 100 + 'vw',
                        width: (4 + Math.random() * 6) + 'px',
                        height: (4 + Math.random() * 6) + 'px',
                        'animation-duration': (8 + Math.random() * 12) + 's',
                        'animation-delay': (Math.random() * 10) + 's',
                        'background': `rgba(196, 162, 122, ${0.15 + Math.random() * 0.3})`
                    }
                });
            }
        });
    </script>
</body>
</html>

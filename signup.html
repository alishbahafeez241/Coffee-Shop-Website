<!DOCTYPE html>
<html lang="en">
<head>
    <title>Sign Up | Coffee Beans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2C1810 0%, #4A2C1A 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .coffee-header {
            background-color: #2c1810;
            color: #f5e6d3;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 3px solid #c4a27a;
        }
        .coffee-header h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 0.5rem; font-weight: 600; }
        .nav-coffee .nav-link { color: #f5e6d3; font-weight: 500; margin: 0 0.5rem; padding: 0.5rem 0.75rem; text-decoration: none; }
        .nav-coffee .nav-link:hover { color: #c4a27a; text-decoration: underline; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .coffee-card {
            background: #FFF8F0;
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .card-header-coffee {
            background: #3E2723;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .coffee-icon-large { font-size: 3.8rem; color: #f0d5b0; }
        .card-header-coffee h2 { color: #FFF8F0; font-size: 28px; margin-top: 0.5rem; }
        .card-header-coffee p { color: #D7CCC8; margin-top: 8px; font-size: 14px; }
        .login-form-custom { padding: 2rem 1.8rem; }
        .input-group-custom label { display: block; margin-bottom: 8px; font-weight: 600; color: #3E2723; }
        .input-group-custom input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0D5C1;
            border-radius: 16px;
            font-size: 16px;
            background: white;
        }
        .input-group-custom input:focus {
            outline: none;
            border-color: #6F4E37;
            box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.2);
        }
        .btn-coffee {
            background: #6F4E37;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
        }
        .btn-coffee:hover { background: #4A2C1A; }
        .login-link-custom { text-align: center; font-size: 14px; color: #5D4037; margin-top: 1rem; }
        .login-link-custom a { color: #6F4E37; font-weight: bold; text-decoration: none; }
        .login-link-custom a:hover { text-decoration: underline; }
        .error-message-custom {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        .success-message-custom {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        footer {
            background-color: #2c1810;
            color: #f5e6d3;
            text-align: center;
            padding: 1.2rem;
            margin-top: auto;
        }
        .field-hint { font-size:12px; color:#C62828; margin-top:4px; min-height:14px; }
    </style>
</head>
<body>
    <header class="coffee-header">
        <h1><i class="bi bi-cup-hot-fill me-2"></i>COFFEE BEANS</h1>
        <nav class="navbar navbar-expand-lg p-0 justify-content-center">
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav nav-coffee">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    <div class="card coffee-card">
                        <div class="card-header-coffee">
                            <div class="coffee-icon-large"><i class="bi bi-person-plus-fill"></i></div>
                            <h2>Join the Coffee Club!</h2>
                            <p>Create your account to enjoy exclusive offers</p>
                        </div>
                        <div class="login-form-custom">
                            <div class="success-message-custom" id="successMsg">
                                <i class="bi bi-check-circle-fill me-1"></i> Account created! Redirecting to login...
                            </div>
                            <div class="error-message-custom" id="errorMsg">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i> Please fill all fields correctly.
                            </div>
                            <form id="signupForm">
                                <div class="mb-3 input-group-custom">
                                    <label><i class="bi bi-person-fill me-1"></i> Full Name</label>
                                    <input type="text" class="form-control" id="fullName" placeholder="Enter your full name">
                                    <div class="field-hint" id="nameHint"></div>
                                </div>
                                <div class="mb-3 input-group-custom">
                                    <label><i class="bi bi-envelope-fill me-1"></i> Email Address</label>
                                    <input type="email" class="form-control" id="signupEmail" placeholder="Enter your email">
                                    <div class="field-hint" id="emailHint"></div>
                                </div>
                                <div class="mb-3 input-group-custom">
                                    <label><i class="bi bi-lock-fill me-1"></i> Password</label>
                                    <input type="password" class="form-control" id="signupPassword" placeholder="Create a password (min 6 characters)">
                                    <div class="field-hint" id="passwordHint"></div>
                                </div>
                                <div class="mb-3 input-group-custom">
                                    <label><i class="bi bi-shield-lock-fill me-1"></i> Confirm Password</label>
                                    <input type="password" class="form-control" id="confirmPassword" placeholder="Confirm your password">
                                    <div class="field-hint" id="confirmHint"></div>
                                </div>
                                <button type="submit" class="btn-coffee mb-3">
                                    <i class="bi bi-person-plus me-2"></i> CREATE ACCOUNT
                                </button>
                                <div class="login-link-custom">
                                    Already have an account? <a href="login.html">Sign In</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><p class="mb-0">All rights reserved by Maryam Alishba</p></footer>

    <script>
        function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        
        document.getElementById('signupForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let fullName = document.getElementById('fullName');
            let email = document.getElementById('signupEmail');
            let pwd = document.getElementById('signupPassword');
            let confirm = document.getElementById('confirmPassword');
            let nameHint = document.getElementById('nameHint');
            let emailHint = document.getElementById('emailHint');
            let pwdHint = document.getElementById('passwordHint');
            let confirmHint = document.getElementById('confirmHint');
            let errorMsg = document.getElementById('errorMsg');
            let successMsg = document.getElementById('successMsg');
            let ok = true;
            
            if(fullName.value.trim().length < 2) { nameHint.textContent = 'Enter your full name'; ok=false; } 
            else { nameHint.textContent = ''; }
            
            if(!isValidEmail(email.value.trim())) { emailHint.textContent = 'Enter valid email'; ok=false; } 
            else { emailHint.textContent = ''; }
            
            if(pwd.value.length < 6) { pwdHint.textContent = 'Password must be at least 6 characters'; ok=false; } 
            else { pwdHint.textContent = ''; }
            
            if(pwd.value !== confirm.value) { confirmHint.textContent = 'Passwords do not match'; ok=false; } 
            else { confirmHint.textContent = ''; }
            
            if(!ok) {
                errorMsg.style.display = 'block';
                successMsg.style.display = 'none';
                return;
            }
            
            errorMsg.style.display = 'none';
            successMsg.style.display = 'block';
            
            // Save to localStorage
            localStorage.setItem('user_email', email.value.trim());
            localStorage.setItem('user_password', pwd.value);
            localStorage.setItem('user_name', fullName.value.trim());
            
            setTimeout(function(){
                window.location.href = 'login.html';
            }, 2000);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <title>Forgot Password | Coffee Beans</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2C1810 0%, #4A2C1A 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .coffee-header {
            background-color: #2c1810;
            color: #f5e6d3;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 3px solid #c4a27a;
        }
        .coffee-header h1 { font-size: 2.5rem; letter-spacing: 2px; margin-bottom: 0.5rem; font-weight: 600; }
        .nav-coffee .nav-link { color: #f5e6d3; font-weight: 500; margin: 0 0.5rem; padding: 0.5rem 0.75rem; text-decoration: none; display: inline-block; }
        .nav-coffee .nav-link:hover { color: #c4a27a; text-decoration: underline; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .coffee-card {
            background: #FFF8F0;
            border: none;
            border-radius: 28px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        .card-header-coffee {
            background: #3E2723;
            padding: 2rem 1.5rem;
            text-align: center;
        }
        .coffee-icon-large { font-size: 3.8rem; color: #f0d5b0; }
        .card-header-coffee h2 { color: #FFF8F0; font-size: 28px; margin-top: 0.5rem; }
        .card-header-coffee p { color: #D7CCC8; margin-top: 8px; font-size: 14px; }
        .login-form-custom { padding: 2rem 1.8rem; }
        .input-group-custom label { display: block; margin-bottom: 8px; font-weight: 600; color: #3E2723; }
        .input-group-custom input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #E0D5C1;
            border-radius: 16px;
            font-size: 16px;
            background: white;
        }
        .input-group-custom input:focus {
            outline: none;
            border-color: #6F4E37;
            box-shadow: 0 0 0 3px rgba(111, 78, 55, 0.2);
        }
        .btn-coffee {
            background: #6F4E37;
            color: white;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 40px;
            width: 100%;
            cursor: pointer;
        }
        .btn-coffee:hover { background: #4A2C1A; }
        .back-link { text-align: center; margin-top: 1rem; }
        .back-link a { color: #6F4E37; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }
        .error-message {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        .success-message {
            background: #E8F5E9;
            color: #2E7D32;
            padding: 12px;
            border-radius: 16px;
            margin-bottom: 1.5rem;
            text-align: center;
            display: none;
        }
        footer {
            background-color: #2c1810;
            color: #f5e6d3;
            text-align: center;
            padding: 1.2rem;
            margin-top: auto;
        }
        .field-hint { font-size:12px; color:#C62828; margin-top:4px; min-height:14px; }
    </style>
</head>
<body>
    <header class="coffee-header">
        <h1><i class="bi bi-cup-hot-fill me-2"></i>COFFEE BEANS</h1>
        <nav class="navbar navbar-expand-lg p-0 justify-content-center">
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav nav-coffee">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="menu.html">Menu</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                    <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
                    <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
                    <li class="nav-item"><a class="nav-link" href="reviews.html">Reviews</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <div class="login-wrapper">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-12 col-sm-10 col-md-8 col-lg-5 col-xl-4">
                    <div class="card coffee-card">
                        <div class="card-header-coffee">
                            <div class="coffee-icon-large"><i class="bi bi-key-fill"></i></div>
                            <h2>Forgot Password?</h2>
                            <p>Don't worry! Enter your email to reset password</p>
                        </div>
                        <div class="login-form-custom">
                            <div class="error-message" id="errorMsg">
                                <i class="bi bi-exclamation-triangle-fill me-1"></i> Email not found! Please sign up first.
                            </div>
                            <div class="success-message" id="successMsg">
                                <i class="bi bi-check-circle-fill me-1"></i> Password reset link sent to your email!
                            </div>
                            
                            <form id="forgotForm">
                                <div class="mb-3 input-group-custom">
                                    <label><i class="bi bi-envelope-fill me-1"></i> Email Address</label>
                                    <input type="email" class="form-control" id="resetEmail" placeholder="Enter your registered email">
                                    <div class="field-hint" id="emailHint"></div>
                                </div>
                                <div class="mb-3 input-group-custom" id="newPasswordDiv" style="display:none;">
                                    <label><i class="bi bi-lock-fill me-1"></i> New Password</label>
                                    <input type="password" class="form-control" id="newPassword" placeholder="Enter new password (min 6 characters)">
                                    <div class="field-hint" id="newPasswordHint"></div>
                                </div>
                                <div class="mb-3 input-group-custom" id="confirmPasswordDiv" style="display:none;">
                                    <label><i class="bi bi-shield-lock-fill me-1"></i> Confirm New Password</label>
                                    <input type="password" class="form-control" id="confirmNewPassword" placeholder="Confirm new password">
                                    <div class="field-hint" id="confirmHint"></div>
                                </div>
                                <button type="submit" class="btn-coffee mb-3" id="submitBtn">
                                    <i class="bi bi-send me-2"></i> SEND RESET LINK
                                </button>
                                <div class="back-link">
                                    <a href="login.html"><i class="bi bi-arrow-left me-1"></i> Back to Login</a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer><p class="mb-0">All rights reserved by Maryam Alishba</p></footer>

    <script>
        let step = 1; // 1 = email, 2 = new password
        let verifiedEmail = '';
        
        function isValidEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
        
        // Check if email exists (demo or registered)
        function emailExists(email) {
            var savedEmail = localStorage.getItem('user_email');
            return (email === 'user@coffee.com' || savedEmail === email);
        }
        
        document.getElementById('forgotForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            if(step === 1) {
                // Step 1: Verify email
                let email = document.getElementById('resetEmail');
                let emailHint = document.getElementById('emailHint');
                let errorMsg = document.getElementById('errorMsg');
                let successMsg = document.getElementById('successMsg');
                
                if(!isValidEmail(email.value.trim())) {
                    emailHint.textContent = 'Please enter a valid email address';
                    return;
                }
                emailHint.textContent = '';
                
                if(emailExists(email.value.trim())) {
                    verifiedEmail = email.value.trim();
                    errorMsg.style.display = 'none';
                    successMsg.style.display = 'block';
                    successMsg.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Email verified! Now enter your new password.';
                    
                    // Show password fields
                    document.getElementById('newPasswordDiv').style.display = 'block';
                    document.getElementById('confirmPasswordDiv').style.display = 'block';
                    document.getElementById('submitBtn').innerHTML = '<i class="bi bi-check-lg me-2"></i> RESET PASSWORD';
                    step = 2;
                } else {
                    errorMsg.style.display = 'block';
                    successMsg.style.display = 'none';
                }
            } 
            else if(step === 2) {
                // Step 2: Reset password
                let newPwd = document.getElementById('newPassword');
                let confirmPwd = document.getElementById('confirmNewPassword');
                let newPwdHint = document.getElementById('newPasswordHint');
                let confirmHint = document.getElementById('confirmHint');
                let errorMsg = document.getElementById('errorMsg');
                let successMsg = document.getElementById('successMsg');
                let ok = true;
                
                if(newPwd.value.length < 6) {
                    newPwdHint.textContent = 'Password must be at least 6 characters';
                    ok = false;
                } else {
                    newPwdHint.textContent = '';
                }
                
                if(newPwd.value !== confirmPwd.value) {
                    confirmHint.textContent = 'Passwords do not match';
                    ok = false;
                } else {
                    confirmHint.textContent = '';
                }
                
                if(!ok) return;
                
                // Save new password
                if(verifiedEmail === 'user@coffee.com') {
                    // Demo account - can't change demo password, just show message
                    successMsg.style.display = 'block';
                    successMsg.innerHTML = '<i class="bi bi-info-circle-fill me-1"></i> Demo account password cannot be changed. Use "coffee123" to login.';
                    errorMsg.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    // Update registered user's password
                    localStorage.setItem('user_password', newPwd.value);
                    successMsg.style.display = 'block';
                    successMsg.innerHTML = '<i class="bi bi-check-circle-fill me-1"></i> Password reset successful! Redirecting to login...';
                    errorMsg.style.display = 'none';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            }
        });
    </script>
</body>
</html>
